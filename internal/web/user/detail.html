<script>
(function () {
  const $ = id => document.getElementById(id);
  const toast = $('toast');

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function formatSize(b) {
    if (b == null) return '— KB';
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    return (b/1024/1024).toFixed(1) + ' MB';
  }
  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' +
           String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
  }
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 解析 URL 中的 ref：/deploy/{uuid}
  function resolveRef() {
    const p = location.pathname;
    const m = p.match(/^\/deploy\/([^/]+)$/);
    return m ? { value: m[1] } : null;
  }

  const ref = resolveRef();
  if (!ref) {
    $('d-title').textContent = '无效的详情页地址';
    return;
  }

  let deployData = null;

  async function loadDeploy() {
    try {
      const r = await fetch('/api/deploys/' + encodeURIComponent(ref.value));
      const j = await r.json();
      if (!j.success && j.id == null) {
        $('d-title').textContent = '未找到应用';
        return;
      }
      const d = j.id ? j : (j.deploy || j);
      deployData = d;

      $('d-title').textContent = d.title || d.filename || d.code || '未命名';
      const cv = d.currentVersionNumber || d.currentVersion || 1;
      $('d-current-badge').textContent = '当前版本 v' + cv;
      $('d-primary-badge').textContent = '主版本 v' + (d.primaryVersionNumber || cv);
      const statusBadge = $('d-status-badge');
      if (d.status === 'inactive') {
        statusBadge.className = 'rounded-full border border-rose-200 bg-rose-50 px-2.5 py-1 text-xs font-semibold text-rose-700';
        statusBadge.textContent = '已下架';
      } else {
        statusBadge.className = 'rounded-full border border-emerald-200 bg-emerald-50 px-2.5 py-1 text-xs font-semibold text-emerald-700';
        statusBadge.textContent = '运行中';
      }
      $('d-description').textContent = d.description || '（无描述）';
      $('d-created').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5 h-4 w-4"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>创建 ' + escapeHtml(formatDate(d.createdAt));
      $('d-modified').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5 h-4 w-4"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>修改 ' + escapeHtml(formatDate(d.updatedAt));
      $('d-views').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5 h-4 w-4"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>' + (d.viewCount || 0) + ' 次访问';
      $('d-likes').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1.5 h-4 w-4"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg>' + (d.likeCount || 0) + ' 个赞';
      $('d-like-count').textContent = (d.likeCount || 0) + ' 赞';

      $('preview-title').textContent = 'v' + cv + ' 预览';
      $('preview-size').textContent = formatSize(d.fileSize);

      const appUrl = '/agent/' + encodeURIComponent(d.code);
      $('link-open-current').href = appUrl;
      $('btn-copy-link').dataset.link = window.location.origin + appUrl;
      if (d.accessProtected) {
        $('preview-title').textContent = '需要访问密码';
        $('preview-size').textContent = '已加密';
        $('preview-container').innerHTML = '<div class="p-8 text-center text-slate-500"><div class="mx-auto mb-3 grid h-12 w-12 place-items-center rounded-full bg-amber-100 text-amber-700">🔒</div><h3 class="text-base font-semibold text-slate-900">该应用已加密</h3><p class="mt-2 text-sm">详情页不加载预览内容。打开应用后输入访问密码查看。</p></div>';
        $('link-download').classList.add('hidden');
      } else {
        $('preview-iframe').src = appUrl + '?preview=1';
        $('link-download').href = '/api/deploy/content?code=' + encodeURIComponent(d.code) + '&download=1';
        $('link-download').classList.remove('hidden');
      }

      // 二维码：优先用后端返回的 qrCodePath，否则前端不展示
      if (d.qrCodePath) {
        const qrCard = $('qr-card');
        const qrImg = $('qr-img');
        const qrLink = $('qr-link');
        qrImg.src = d.qrCodePath;
        qrLink.textContent = window.location.origin + appUrl;
        qrLink.href = appUrl;
        qrCard.classList.remove('hidden');
      }

      loadVersions(d.code);
    } catch (e) {
      $('d-title').textContent = '加载失败：' + e.message;
    }
  }

  async function loadVersions(code) {
    try {
      const r = await fetch('/api/deploys/' + encodeURIComponent(code) + '/versions');
      const j = await r.json();
      const versions = (j.versions || []).slice().sort((a, b) => {
        const av = Number(a.versionNumber || a.version || 0);
        const bv = Number(b.versionNumber || b.version || 0);
        return bv - av;
      });
      // 找当前 / 主版本号
      const current = versions.find(v => v.isCurrent) || versions.find(v => v.versionNumber === j.currentVersion);
      const primary = versions.find(v => v.isPrimary) || current;
      if (current) {
        const cv = current.versionNumber || current.version;
        $('d-current-badge').textContent = '当前版本 v' + cv;
        $('d-like-count').dataset.version = cv;
        $('preview-title').textContent = 'v' + cv + ' 预览';
      }
      if (primary) {
        $('d-primary-badge').textContent = '主版本 v' + (primary.versionNumber || primary.version);
      }
      $('versions-count').textContent = versions.length + ' 个版本';
      const listEl = $('versions-list');
      if (versions.length === 0) {
        listEl.innerHTML = '<div class="rounded-xl border border-dashed border-slate-200 bg-white/60 p-6 text-center text-sm text-slate-500">暂无版本</div>';
        return;
      }
      listEl.innerHTML = versions.map(v => {
        const isCurrent = v.isCurrent || v.versionNumber === j.currentVersion;
        const isPrimary = v.isPrimary || isCurrent;
        const lockBadge = v.isLocked
          ? '<span class="rounded-full bg-amber-100 px-2 py-0.5 text-[11px] font-semibold text-amber-700">已锁定</span>'
          : '';
        const cls = isCurrent
          ? 'rounded-xl border p-3 text-left transition border-sky-300 bg-sky-50/90 shadow-sm'
          : 'rounded-xl border p-3 text-left transition border-slate-200 bg-white hover:bg-slate-50/70';
        return `
          <div class="${cls}">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-2">
                  <p class="font-semibold text-slate-900">v${v.versionNumber || v.version}</p>
                  ${isCurrent ? '<span class="rounded-full bg-emerald-100 px-2 py-0.5 text-[11px] font-semibold text-emerald-700">当前版本</span>' : ''}
                  ${isPrimary ? '<span class="rounded-full bg-violet-100 px-2 py-0.5 text-[11px] font-semibold text-violet-700">主版本</span>' : ''}
                  ${lockBadge}
                </div>
                <p class="mt-1 line-clamp-2 text-xs text-slate-500">${escapeHtml(v.description || '（无描述）')}</p>
                <div class="mt-2 space-y-1 text-xs text-slate-400">
                  <p>创建 ${escapeHtml(formatDate(v.createdAt))}</p>
                  <p>修改 ${escapeHtml(formatDate(v.updatedAt || v.createdAt))}</p>
                </div>
                <p class="mt-1 inline-flex items-center text-xs text-slate-400">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1 h-3.5 w-3.5">
                    <path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/>
                  </svg>
                  ${v.likeCount || 0} 赞
                </p>
              </div>
              <span class="shrink-0 text-xs text-slate-400">${formatSize(v.size || v.fileSize || 0)}</span>
            </div>
            <div class="mt-3 flex items-center gap-2">
              ${!isCurrent ? `<button data-action="set-current" data-version="${v.versionNumber || v.version}" class="rounded-md border border-slate-200 px-2 py-1 text-xs font-medium text-slate-600 hover:bg-slate-50">设为当前</button>` : ''}
              ${!v.isLocked ? `<button data-action="lock-version" data-version="${v.versionNumber || v.version}" class="rounded-md border border-slate-200 px-2 py-1 text-xs font-medium text-slate-600 hover:bg-slate-50">锁定</button>` : ''}
              ${v.isLocked ? `<button data-action="unlock-version" data-version="${v.versionNumber || v.version}" class="rounded-md border border-slate-200 px-2 py-1 text-xs font-medium text-slate-600 hover:bg-slate-50">解锁</button>` : ''}
              <a href="/agent/${encodeURIComponent(code)}?v=${v.versionNumber || v.version}" target="_blank" rel="noopener" class="rounded-md border border-slate-200 px-2 py-1 text-xs font-medium text-slate-600 hover:bg-slate-50">查看</a>
            </div>
          </div>
        `;
      }).join('');

      listEl.querySelectorAll('[data-action="set-current"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const v = parseInt(btn.dataset.version, 10);
          try {
            const r = await fetch('/api/deploys/' + encodeURIComponent(code) + '/current', {
              method: 'PATCH', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ versionNumber: v })
            });
            const j = await r.json();
            if (j.success) { showToast('已切换当前版本'); loadDeploy(); }
            else showToast('切换失败：' + (j.detail || j.errorCode));
          } catch (e) { showToast('错误：' + e.message); }
        });
      });
      listEl.querySelectorAll('[data-action="lock-version"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const v = parseInt(btn.dataset.version, 10);
          try {
            const r = await fetch(`/api/deploys/${encodeURIComponent(code)}/versions/${v}/lock`, {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ locked: true })
            });
            const j = await r.json();
            if (j.success) { showToast('已锁定'); loadVersions(code); }
            else showToast('锁定失败：' + (j.detail || j.errorCode));
          } catch (e) { showToast('错误：' + e.message); }
        });
      });
      listEl.querySelectorAll('[data-action="unlock-version"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const v = parseInt(btn.dataset.version, 10);
          try {
            const r = await fetch(`/api/deploys/${encodeURIComponent(code)}/versions/${v}/lock`, {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ locked: false })
            });
            const j = await r.json();
            if (j.success) { showToast('已解锁'); loadVersions(code); }
            else showToast('解锁失败：' + (j.detail || j.errorCode));
          } catch (e) { showToast('错误：' + e.message); }
        });
      });
    } catch (e) {
      $('versions-list').innerHTML = '<div class="rounded-xl border border-rose-100 bg-rose-50 p-4 text-xs text-rose-700">加载版本失败：' + escapeHtml(e.message) + '</div>';
    }
  }

  // 视口切换
  document.querySelectorAll('.vp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.vp-btn').forEach(b => {
        b.classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
        b.classList.add('text-gray-500', 'hover:text-gray-700');
      });
      btn.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
      btn.classList.remove('text-gray-500', 'hover:text-gray-700');
      const vp = btn.dataset.vp;
      const iframe = $('preview-iframe');
      if (vp === 'desktop') { iframe.style.width = '100%'; iframe.style.height = '100%'; }
      else if (vp === 'tablet') { iframe.style.width = '768px'; iframe.style.height = '1024px'; iframe.style.maxHeight = '100%'; }
      else if (vp === 'mobile') { iframe.style.width = '375px'; iframe.style.height = '667px'; iframe.style.maxHeight = '100%'; }
    });
  });

  // 点赞
  $('btn-like').addEventListener('click', async () => {
    if (!deployData || !deployData.code) { showToast('应用未加载'); return; }
    try {
      const r = await fetch('/api/deploys/' + encodeURIComponent(deployData.code) + '/like', { method: 'POST' });
      const j = await r.json();
      if (j.success) { showToast('点赞成功，当前 ' + j.likeCount + ' 个赞'); loadDeploy(); }
      else showToast('点赞失败：' + (j.detail || j.errorCode));
    } catch (e) { showToast('错误：' + e.message); }
  });

  // 复制链接
  $('btn-copy-link').addEventListener('click', async () => {
    const link = $('btn-copy-link').dataset.link;
    if (!link) return;
    try { await navigator.clipboard.writeText(link); showToast('链接已复制'); }
    catch (e) { showToast('复制失败：' + e.message); }
  });

  loadDeploy();
})();
</script>
</body>
</html>
