# PagePilot single-container deployment example.
#
# Usage:
#   1. Change HOSTCTL_PUBLIC_BASE_URL to the public URL users and agents will visit.
#   2. Run: docker compose up -d --build
#   3. Open: http://<host>:8787/admin
#   4. Sign in with the first-run admin below, then change the password immediately.
# Full deployment guide: deploy/DOCKER.md
#
# Persistent bind mounts:
#   ./data/docker/hostctl  -> /var/lib/hostctl      SQLite database and app metadata
#   ./data/docker/sql      -> /var/lib/hostctl/sql  SQL files for maintenance/backups/migrations
#   ./data/docker/hosted   -> /var/www/hosted       deployed static sites
#   ./data/docker/logs     -> /var/log/hostctl      service logs, if file logging is enabled later
#
# Default first-run admin:
#   username: admin
#   password: 123456
# Change the password immediately after first login. Existing databases are never overwritten.

services:
  hostctl:
    build:
      context: .
      dockerfile: Dockerfile
    image: pagepilot:latest
    container_name: pagepilot
    restart: unless-stopped

    ports:
      - "8787:8787"

    environment:
      # Public URL used for generated links, QR codes, agent skill download links, and share pages.
      # Include the external port if users visit one, for example https://pagepilot.example.com:1143.
      HOSTCTL_PUBLIC_BASE_URL: "http://localhost:8787"

      # App URL strategy. Keep "path" for /agent/{code}/ compatibility.
      # Use "domain" only after DNS and reverse proxy accept *.your-domain.
      # See deploy/APP_URL_MODE.md for Nginx and Docker examples.
      HOSTCTL_APP_URL_MODE: "path"
      HOSTCTL_APP_DOMAIN_SUFFIX: ""
      HOSTCTL_APP_URL_SCHEME: "https"
      HOSTCTL_APP_URL_PORT: ""

      # Production mode: login is required after the first admin account exists.
      REQUIRE_AUTH: "true"

      # A short deploy cooldown keeps accidental repeated agent calls under control.
      HOSTCTL_COOLDOWN_SECONDS: "10"

      # First-run admin bootstrap. Only used when the database has no users.
      HOSTCTL_ADMIN_USERNAME: "admin"
      HOSTCTL_ADMIN_PASSWORD: "123456"

    volumes:
      - ./data/docker/hostctl:/var/lib/hostctl
      - ./data/docker/sql:/var/lib/hostctl/sql
      - ./data/docker/hosted:/var/www/hosted
      - ./data/docker/logs:/var/log/hostctl

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
